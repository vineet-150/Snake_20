<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="shortcut icon" href="snake_Favicon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            
            <!-- Div 1 for infos -->
            <div class="infos">
                <div class="info">
                    <h3>
                        High Score:
                        <span id="High_Score">0</span>
                    </h3>
                </div>
                <div class="info">

                     <h3>
                        Score:
                        <span id="score">0</span>
                    </h3>

                </div>
                <div class="info">
                     <h3>
                        Time:
                        <span id="time">00:00</span>
                    </h3>
                </div>

            </div>

            <!-- Div 2 for Board -->
            <div class="board">

                

            </div>

        </section>

        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the snake Game</h3>
                <button class="btn btn-start">
                    start-game

                </button>
            </div>
            <div class="game-over">
                <h3>Game-Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
